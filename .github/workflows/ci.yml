name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # setup-uv reads .python-version, so the pinned interpreter lives in one
      # file instead of being duplicated into this workflow.
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # --locked fails the build if uv.lock is out of sync with pyproject.toml,
      # so CI never silently resolves different versions than a local checkout.
      - run: uv sync --locked

      - run: uv run pytest
