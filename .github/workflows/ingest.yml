name: Ingest snapshots

on:
  schedule:
    # Every 6 hours. Minute 23 rather than :00 because GitHub delays or
    # drops runs scheduled at congested times.
    - cron: "23 1,7,13,19 * * *"
  workflow_dispatch:

# Commits the JSON summary and uploads the DB release asset.
permissions:
  contents: write

# A delayed run must never overlap the next one: both would race on the
# release asset and the summary commit.
concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --locked

      # The append-only DB lives as a rolling Release asset, not in the
      # repo tree: it crossed GitHub's file-size warning threshold within
      # a day of 6-hourly commits. Each run restores it, appends, and
      # re-uploads; the repo itself only ever commits the small summary.
      - name: Restore DB from data release
        run: |
          mkdir -p data
          if ! gh release download data --pattern snapshots.db --dir data; then
            echo "No data release yet; starting a fresh DB."
          fi

      - run: uv run python -m pm_scanner.ingest --db data/snapshots.db

      - run: uv run python -m pm_scanner.dutchbook --db data/snapshots.db

      - run: uv run python -m pm_scanner.export --db data/snapshots.db --out data/summary.json

      - name: Upload DB to data release
        run: |
          if ! gh release view data > /dev/null 2>&1; then
            gh release create data --title "Snapshot data" --notes \
              "Rolling append-only SQLite time series. The latest asset supersedes earlier uploads; the repo's data/summary.json is derived from it each run."
          fi
          gh release upload data data/snapshots.db --clobber

      - name: Commit summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/summary.json
          if git diff --cached --quiet; then
            echo "No summary change; nothing to commit."
            exit 0
          fi
          git commit -m "data: summary $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          # A code push may have landed while we ingested; replay our
          # commit on top. If that still fails, losing one summary is
          # preferable to force-pushing.
          git pull --rebase origin main
          git push origin main
